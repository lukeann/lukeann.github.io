<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR TRACKER - 猪猪虾</title>
    <!-- 引入字体图标库 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* 基础设置 */
            --base-font-size: 16px; /* 基准字体大小，可通过JS调节 */
            
            /* 浅色模式 (默认) */
            --ikea-blue: #0058a3;
            --ikea-yellow: #ffdb00;
            --text-primary: #111111;
            --text-secondary: #484848;
            --bg-page: #f5f5f5;
            --bg-card: #ffffff;
            --bg-table-hover: #f9f9f9;
            --border-color: #e0e0e0;
            --tag-bg: #f5f5f5;
            --tag-text: #111;
            --tag-blue-bg: #e6f0fa;
            --tag-blue-text: #0058a3;
            --tag-yellow-bg: #fff9c4;
            --tag-yellow-text: #998200;
            --input-bg: #fff;
            --shadow-color: rgba(0,0,0,0.05);
            --modal-overlay: rgba(0,0,0,0.5);
            --font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }

        /* 深色模式适配 */
        @media (prefers-color-scheme: dark) {
            :root {
                --ikea-blue: #4fa4f3; /* 深色模式下蓝色调亮一点，更清晰 */
                --ikea-yellow: #ffd200;
                --text-primary: #e0e0e0; /* 灰白文字，不刺眼 */
                --text-secondary: #a0a0a0;
                --bg-page: #121212; /* 深灰背景 */
                --bg-card: #1e1e1e; /* 卡片背景 */
                --bg-table-hover: #2c2c2c;
                --border-color: #333333;
                --tag-bg: #2d2d2d;
                --tag-text: #ddd;
                --tag-blue-bg: rgba(0, 88, 163, 0.3);
                --tag-blue-text: #6cb6ff;
                --tag-yellow-bg: rgba(255, 219, 0, 0.15);
                --tag-yellow-text: #ffdb4d;
                --input-bg: #2d2d2d;
                --shadow-color: rgba(0,0,0,0.3);
                --modal-overlay: rgba(0,0,0,0.7);
            }
        }

        html { font-size: var(--base-font-size); }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-page);
            color: var(--text-primary);
            margin: 0;
            padding: 2.5rem 1.25rem;
            line-height: 1.5;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 布局优化 */
        .container { 
            max-width: 1400px;
            margin: 0 auto; 
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 0.25rem 1.25rem var(--shadow-color);
            transition: background 0.3s;
        }

        /* 头部 */
        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.1875rem solid var(--text-primary);
            padding-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 1.25rem;
        }

        h1 {
            font-size: 2.625rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.0625rem;
            color: var(--ikea-blue);
        }

        .header-meta {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: right;
        }

        /* 仪表盘 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(12.5rem, 1fr));
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background-color: var(--bg-table-hover);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, background 0.3s;
        }
        
        .card:hover { transform: translateY(-0.25rem); box-shadow: 0 0.5rem 1.5rem var(--shadow-color); }

        .card-title {
            font-size: 0.8125rem; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 0.625rem;
        }

        .card-value {
            font-size: 2.25rem; font-weight: 800; color: var(--text-primary); line-height: 1;
        }

        .card-value.highlight { color: var(--ikea-blue); }
        .card-value.success { color: #28a745; } /* 深色模式下绿色也要亮一点，这里用通用绿 */
        @media (prefers-color-scheme: dark) { .card-value.success { color: #4cd964; } }

        /* 工具栏 */
        .toolbar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            background-color: var(--tag-bg);
            color: var(--text-primary);
            border: 1px solid transparent;
            padding: 0.625rem 1.5rem;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 3.125rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover { background-color: var(--border-color); transform: scale(1.02); }
        .btn-primary { background-color: var(--ikea-blue); color: white; }
        .btn-primary:hover { background-color: var(--ikea-blue); opacity: 0.9; }
        .btn-danger { color: #d32f2f; background: var(--bg-card); border: 1px solid #d32f2f; }
        @media (prefers-color-scheme: dark) { .btn-danger { color: #ff5252; border-color: #ff5252; background: transparent; } }
        
        .btn-sync { background-color: #28a745; color: white; margin-left: auto; }
        .btn-sync:hover { background-color: #218838; }
        .btn-sync.loading { opacity: 0.8; cursor: wait; }

        /* 表格 */
        .table-wrapper {
            overflow: auto;
            max-height: 75vh;
            border-radius: 0.5rem;
            padding-bottom: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 1rem; min-width: 62.5rem; }

        tr { background-color: var(--bg-card); }

        th {
            text-align: left; padding: 1.125rem 1rem; font-weight: 800; color: var(--text-secondary);
            border-bottom: 0.125rem solid var(--text-primary); white-space: nowrap; position: sticky; top: 0; background: var(--bg-card); z-index: 10;
            background-clip: padding-box;
        }

        td {
            padding: 1rem; border-bottom: 1px solid var(--border-color); vertical-align: top;
            color: var(--text-primary); background-color: inherit;
        }

        tr:hover { background-color: var(--bg-table-hover); }

        /* 冻结首列和第二列 */
        th:nth-child(1), td:nth-child(1) {
            position: sticky; left: 0; z-index: 5;
            width: 3.5rem; min-width: 3.5rem; max-width: 3.5rem; padding-left: 0.5rem; padding-right: 0.5rem;
        }
        th:nth-child(2), td:nth-child(2) {
            position: sticky; left: 3.5rem; z-index: 5;
        }
        /* 为第二列右侧添加阴影，表示浮动层 */
        th:nth-child(2)::after, td:nth-child(2)::after {
            content: ''; position: absolute; top: 0; right: -5px; bottom: 0; width: 5px;
            background: linear-gradient(to right, rgba(0,0,0,0.05), transparent); pointer-events: none;
        }
        @media (prefers-color-scheme: dark) { 
            th:nth-child(2)::after, td:nth-child(2)::after { background: linear-gradient(to right, rgba(0,0,0,0.2), transparent); }
        }
        th:nth-child(1), th:nth-child(2) { z-index: 15; background-color: var(--bg-card); }
        tr:hover th:nth-child(1), tr:hover th:nth-child(2) { background-color: var(--bg-card); }

        /* 编辑器 & 控件 */
        .editable { min-height: 1.5rem; cursor: text; padding: 0.25rem; border-radius: 0.25rem; transition: background 0.2s; }
        .editable:hover { background: var(--bg-table-hover); }
        .editable:focus { background: var(--input-bg); box-shadow: 0 0 0 2px var(--ikea-blue); }
        
        .tag {
            display: inline-flex; align-items: center; padding: 0.25rem 0.625rem; border-radius: 0.375rem;
            font-size: 0.8125rem; font-weight: 700; margin-bottom: 0.25rem;
            background: var(--tag-bg); color: var(--tag-text);
        }
        .tag-blue { background: var(--tag-blue-bg); color: var(--tag-blue-text); }
        .tag-yellow { background: var(--tag-yellow-bg); color: var(--tag-yellow-text); }

        /* 复选框 */
        .checkbox-wrapper { display: flex; justify-content: center; position: relative; align-items: center; }
        input[type="checkbox"] {
            width: 1.5rem; height: 1.5rem; cursor: pointer; accent-color: var(--ikea-blue); margin: 0;
        }
        .checkbox-revert { 
            position: absolute; right: -0.5rem; opacity: 0; cursor: pointer; color: #ccc; 
            font-size: 0.875rem; transition: opacity 0.2s; 
        }
        .checkbox-wrapper:hover .checkbox-revert { opacity: 1; }
        .checkbox-revert:hover { color: #d32f2f; transform: scale(1.2); }
        @media (prefers-color-scheme: dark) { .checkbox-revert:hover { color: #ff5252; } }

        /* 拖拽 & 删除 */
        .row-action { opacity: 0; cursor: pointer; color: #ccc; font-size: 1.25rem; text-align: center; transition: opacity 0.2s; }
        tr:hover .row-action { opacity: 1; }
        .row-action:hover { color: #d32f2f; transform: scale(1.2); }
        @media (prefers-color-scheme: dark) { .row-action:hover { color: #ff5252; } }
        
        .col-action { opacity: 0; cursor: pointer; color: #ccc; font-size: 1rem; transition: opacity 0.2s; }
        th:hover .col-action { opacity: 1; }
        .col-action:hover { color: #d32f2f; transform: scale(1.2); }
        @media (prefers-color-scheme: dark) { .col-action:hover { color: #ff5252; } }
        
        .col-move-btn { cursor: pointer; font-size: 0.875rem; color: var(--border-color); padding: 0.125rem; }
        .col-move-btn:hover { color: var(--ikea-blue); }
        .col-move-btn.disabled { opacity: 0.2; cursor: not-allowed; }
        
        .drag-handle { cursor: grab; color: var(--border-color); margin-right: 0.5rem; font-size: 0.875rem; }
        tr:hover .drag-handle { color: var(--text-secondary); }

        /* 状态提示 */
        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 0.75rem 1.5rem;
            border-radius: 2rem; font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000;
        }
        .toast.show { opacity: 1; }

        /* 登录遮罩 */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ikea-blue); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }
        #loginOverlay.hidden { opacity: 0; pointer-events: none; }
        
        .login-box {
            background: var(--bg-card); padding: 2.5rem; border-radius: 1.25rem; text-align: center;
            box-shadow: 0 1.25rem 3.125rem rgba(0,0,0,0.2); width: 20rem;
        }
        .login-box h2 { margin: 0 0 1.25rem 0; color: var(--ikea-blue); }
        .login-box input {
            width: 100%; padding: 0.75rem; margin-bottom: 1.25rem; border: 2px solid var(--border-color);
            border-radius: 0.5rem; font-size: 1rem; text-align: center; background: var(--input-bg); color: var(--text-primary);
        }
        .login-box input:focus { border-color: var(--ikea-blue); }
        .login-box button { width: 100%; }

        /* 通用弹窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card); padding: 2rem; border-radius: 1rem; width: 25rem; max-width: 90%;
            box-shadow: 0 0.625rem 2rem rgba(0,0,0,0.2); color: var(--text-primary);
        }
        .modal h3 { margin-top: 0; color: var(--ikea-blue); }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; margin-bottom: 0.3125rem; font-weight: 600; font-size: 0.875rem; color: var(--text-secondary); }
        .input-group input {
            width: 100%; padding: 0.625rem; border: 2px solid var(--border-color); border-radius: 0.5rem; font-size: 0.875rem;
            background: var(--input-bg); color: var(--text-primary);
        }
        .input-group input:focus { border-color: var(--ikea-blue); }
        
        /* 字体调节滑块 */
        input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 1.25rem; width: 1.25rem; border-radius: 50%;
            background: var(--ikea-blue); cursor: pointer; margin-top: -0.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 0.25rem; cursor: pointer; background: var(--border-color); border-radius: 0.125rem;
        }

        .modal-footer { display: flex; justify-content: flex-end; gap: 0.625rem; margin-top: 1.25rem; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 0.625rem; background: var(--bg-page); }
            .container { padding: 1.25rem; box-shadow: none; border-radius: 0; }
            h1 { font-size: 1.75rem; }
            .btn { padding: 0.5rem 0.875rem; font-size: 0.8125rem; }
            .card-value { font-size: 1.75rem; }
            .toolbar { gap: 0.5rem; }
            .btn-sync { width: 100%; justify-content: center; margin: 0; }
        }
    </style>
</head>
<body>

<!-- 登录遮罩 -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>🔒 访问验证</h2>
        <p style="color:var(--text-secondary); margin-bottom:1.25rem; font-size:0.875rem;">请输入密码访问 PR TRACKER</p>
        <input type="password" id="loginPwd" placeholder="输入密码" onkeypress="checkEnter(event)">
        <button class="btn btn-primary" onclick="checkLogin()">进入系统</button>
    </div>
</div>

<div class="container">
    <header>
        <div>
            <h1>PR TRACKER</h1>
            <div style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 500;">
                小红书合作跟进 · 猪猪虾
            </div>
        </div>
        <div class="header-meta">
            <div><i class="fas fa-map-marker-alt"></i> 佛山市禅城区同华西路9号</div>
            <div style="margin-top:0.25rem;"><i class="fas fa-phone"></i> 18485667303</div>
        </div>
    </header>

    <!-- 仪表盘 -->
    <div class="dashboard">
        <div class="card">
            <div class="card-title">预计总收入 (Pending)</div>
            <div class="card-value highlight" id="totalProjected">¥0</div>
        </div>
        <div class="card">
            <div class="card-title">已到账 (Confirmed)</div>
            <div class="card-value success" id="totalConfirmed">¥0</div>
        </div>
        <div class="card">
            <div class="card-title">待入账 (Waiting)</div>
            <div class="card-value" id="totalWaiting" style="color: var(--text-secondary); opacity: 0.6;">¥0</div>
        </div>
        <div class="card">
            <div class="card-title">寄拍 / 置换</div>
            <div class="card-value" style="font-size: 1.75rem;">
                <span style="color: var(--ikea-blue);" id="countPaid">0</span> / 
                <span style="color: var(--tag-yellow-text);" id="countExchange">0</span>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn btn-primary" onclick="addRow()"><i class="fas fa-plus"></i> 加行</button>
        <button class="btn" onclick="addColumn()"><i class="fas fa-columns"></i> 加列</button>
        <button class="btn btn-danger" onclick="resetData()"><i class="fas fa-undo"></i> 重置</button>
        <button class="btn" onclick="openAppearanceModal()"><i class="fas fa-adjust"></i> 外观</button>
        
        <button class="btn btn-sync" onclick="openSyncModal()" id="syncBtn">
            <i class="fas fa-cloud"></i> <span id="syncBtnText">云端同步</span>
        </button>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
    
    <div style="text-align: center; color: var(--text-secondary); opacity: 0.5; margin-top: 2rem; font-size: 0.8125rem;">
        提示：拖拽行首图标可排序 · 点击文字可编辑 · 记得点击云端同步保存
    </div>
</div>

<!-- 云同步配置弹窗 -->
<div id="configModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-cog"></i> 云端同步设置</h3>
        <p style="font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 1.25rem;">
            使用 <a href="https://jsonbin.io" target="_blank" style="color: var(--ikea-blue);">JSONBin.io</a> 免费实现手机电脑同步。<br>
            注册后创建一个 Bin，填入下面的信息。
        </p>
        
        <div class="input-group">
            <label>Master Key (X-Master-Key)</label>
            <input type="password" id="apiKey" placeholder="例如: $2b$10$..." onchange="saveConfig()">
        </div>
        <div class="input-group">
            <label>Bin ID</label>
            <input type="text" id="binId" placeholder="例如: 65d4f..." onchange="saveConfig()">
        </div>

        <div class="modal-footer">
            <button class="btn" onclick="closeModal('configModal')">关闭</button>
            <button class="btn btn-primary" onclick="manualSync()">立即同步</button>
        </div>
    </div>
</div>

<!-- 外观设置弹窗 -->
<div id="appearanceModal" class="modal">
    <div class="modal-content" style="width: 20rem;">
        <h3><i class="fas fa-adjust"></i> 外观设置</h3>
        
        <div class="input-group" style="margin-top: 1.5rem;">
            <label style="display:flex; justify-content:space-between;">
                字体大小 <span id="fontSizeDisplay">16px</span>
            </label>
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size: 12px;">A</span>
                <input type="range" id="fontSlider" min="12" max="24" step="1" value="16" oninput="updateFontSize(this.value)">
                <span style="font-size: 20px;">A</span>
            </div>
        </div>

        <div class="input-group" style="margin-top: 1.5rem;">
            <label>颜色模式</label>
            <div style="font-size: 0.875rem; color: var(--text-secondary); background: var(--bg-table-hover); padding: 10px; border-radius: 8px;">
                <i class="fas fa-magic"></i> 自动跟随系统（支持深色模式）
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn btn-primary" onclick="closeModal('appearanceModal')">完成</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">已保存</div>

<script>
    // --- 登录逻辑 ---
    const LOGIN_KEY = 'pr_tracker_login';
    
    function checkLogin() {
        const pwd = document.getElementById('loginPwd').value;
        if (pwd === '200366') {
            document.getElementById('loginOverlay').classList.add('hidden');
            localStorage.setItem(LOGIN_KEY, 'true'); // 记住登录状态
        } else {
            alert('密码错误，请重试');
            document.getElementById('loginPwd').value = '';
        }
    }

    function checkEnter(e) {
        if(e.key === 'Enter') checkLogin();
    }

    // 页面加载时检查
    if (localStorage.getItem(LOGIN_KEY) === 'true') {
        document.getElementById('loginOverlay').classList.add('hidden');
    }

    // --- 外观设置逻辑 ---
    function initAppearance() {
        const savedSize = localStorage.getItem('fontSize') || '16';
        updateFontSize(savedSize);
        document.getElementById('fontSlider').value = savedSize;
    }

    function updateFontSize(val) {
        document.documentElement.style.setProperty('--base-font-size', val + 'px');
        document.getElementById('fontSizeDisplay').innerText = val + 'px';
        localStorage.setItem('fontSize', val);
    }

    window.openAppearanceModal = () => document.getElementById('appearanceModal').classList.add('active');

    // 默认数据
    const defaultHeaders = ["品牌名称", "合作方式", "价格", "淘宝垫付", "本金已返", "款式/要求", "截止日期", "已收到", "已拍摄", "已发布", "已寄回", "已结款"];
    const defaultData = [
        {id: 1, cells: ["INHERWORDS", "置换", "置换", "", false, "长袖T恤", "3月内", false, false, false, false, false]},
        {id: 2, cells: ["INHERWORDS", "置换", "置换", "", false, "黑色衬衫长袖", "3月内", false, false, false, false, false]},
        {id: 3, cells: ["药九玫柒 (1997邮政局)", "置换", "置换", "", false, "印花短袖", "待定", true, true, false, "N/A", "N/A"]},
        {id: 4, cells: ["WhyBerry", "置换", "置换", "", false, "红色外套", "3月内", false, false, false, "N/A", "N/A"]},
        {id: 5, cells: ["Bill conch", "置换", "置换", "", false, "无袖蓝色裙子", "待定", false, false, false, "N/A", "N/A"]},
        {id: 6, cells: ["暴走蓝鲸", "寄拍", "120", "", false, "红格子衬衫", "3.25前", false, false, false, false, false]},
        {id: 7, cells: ["MR MUKOK", "寄拍", "120", "", false, "亚麻衬衫 (出片5天寄回)", "3月内", true, false, false, false, false]},
        {id: 8, cells: ["mysugarbabe (MSB)", "置换", "置换", "", false, "蕾丝风半裙", "待定", false, false, false, "N/A", "N/A"]},
        {id: 9, cells: ["RPB Brand", "寄拍", "120", "", false, "裤子+上衣", "3月底前", false, false, false, false, false]},
        {id: 10, cells: ["living town", "寄拍", "130", "", false, "无袖格子裙", "3月内", false, false, false, false, false]},
        {id: 11, cells: ["fisherman store", "置换", "置换", "", false, "马甲衬衫", "3月内", false, false, false, false, false]},
        {id: 12, cells: ["round ship", "寄拍", "120", "", false, "刺绣吊带裙", "3月内", true, true, false, false, false]},
        {id: 13, cells: ["gtrg", "寄拍", "150", "", false, "黑色polo＋短裤", "3月内", false, false, false, false, false]},
        {id: 14, cells: ["LRRE", "置换", "置换", "", false, "黑色半裙", "3月内", false, false, false, false, false]}
    ];

    // 状态
    let headers = JSON.parse(localStorage.getItem('headers')) || defaultHeaders;
    let data = JSON.parse(localStorage.getItem('data')) || defaultData;
    let cloudConfig = JSON.parse(localStorage.getItem('cloudConfig')) || { apiKey: '', binId: '' };

    // 数据迁移：自动为老用户增加“淘宝垫付”和“本金已返”两列
    if (!headers.includes("淘宝垫付")) {
        let idx = headers.indexOf("价格");
        if(idx === -1) idx = headers.length - 1;
        headers.splice(idx + 1, 0, "淘宝垫付");
        data.forEach(r => r.cells.splice(idx + 1, 0, ""));
    }
    if (!headers.includes("本金已返")) {
        let idx = headers.indexOf("淘宝垫付");
        if(idx === -1) idx = headers.length - 1;
        headers.splice(idx + 1, 0, "本金已返");
        data.forEach(r => r.cells.splice(idx + 1, 0, false));
    }
    // 保存迁移后的数据
    localStorage.setItem('headers', JSON.stringify(headers));
    localStorage.setItem('data', JSON.stringify(data));

    const table = document.getElementById('mainTable');
    const toast = document.getElementById('toast');

    // 初始化
    function init() {
        initAppearance();
        renderTable();
        calculateTotals();
        
        document.getElementById('apiKey').value = cloudConfig.apiKey;
        document.getElementById('binId').value = cloudConfig.binId;

        if (cloudConfig.apiKey && cloudConfig.binId) {
            pullFromCloud();
        }
    }

    // --- 核心逻辑 ---

    function renderTable() {
        const thead = table.querySelector('thead');
        const tbody = table.querySelector('tbody');
        thead.innerHTML = '';
        tbody.innerHTML = '';

        // 表头
        const trH = document.createElement('tr');
        trH.innerHTML = `<th style="width:3.125rem">#</th>`;
        headers.forEach((h, i) => {
            trH.innerHTML += `
                <th class="draggable">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:0.5rem;">
                        <div style="display:flex; flex-direction:column; gap:0.125rem;">
                            <i class="fas fa-caret-left col-move-btn ${i === 0 ? 'disabled' : ''}" onclick="${i === 0 ? '' : `moveColumn(${i}, -1)`}" title="左移"></i>
                            <i class="fas fa-caret-right col-move-btn ${i === headers.length - 1 ? 'disabled' : ''}" onclick="${i === headers.length - 1 ? '' : `moveColumn(${i}, 1)`}" title="右移"></i>
                        </div>
                        <div style="flex:1;" contenteditable="true" onblur="updateHeader(${i}, this.innerText)">${h}</div>
                        <i class="fas fa-times col-action" onclick="deleteColumn(${i})" title="删除列"></i>
                    </div>
                </th>`;
        });
        trH.innerHTML += `<th style="width:3.125rem"></th>`;
        thead.appendChild(trH);

        // 表体
        data.forEach((row, rIdx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><span class="drag-handle" draggable="true" ondragstart="onDragStart(event, ${rIdx})" ondragover="onDragOver(event)" ondrop="onDrop(event, ${rIdx})"><i class="fas fa-bars"></i></span> ${rIdx + 1}</td>`;
            
            row.cells.forEach((cell, cIdx) => {
                let content = '';
                // 渲染逻辑
                if (typeof cell === 'boolean') {
                    content = `<div class="checkbox-wrapper">
                        <input type="checkbox" ${cell ? 'checked' : ''} onchange="updateData(${rIdx}, ${cIdx}, this.checked)">
                        <i class="fas fa-undo checkbox-revert" title="恢复为文字" onclick="revertToText(${rIdx}, ${cIdx})"></i>
                    </div>`;
                } else if (cell === "N/A") {
                    content = `<div style="text-align:center; opacity:0.5;">—</div>`;
                } else {
                    let display = cell;
                    // 样式增强
                    if (headers[cIdx].includes("方式")) {
                        if (cell.includes("寄拍")) display = `<span class="tag tag-blue">寄拍</span>`;
                        if (cell.includes("置换")) display = `<span class="tag tag-yellow">置换</span>`;
                    }
                    content = `<div class="editable" contenteditable="true" onblur="updateData(${rIdx}, ${cIdx}, this.innerText)">${display}</div>`;
                }
                tr.innerHTML += `<td>${content}</td>`;
            });

            tr.innerHTML += `<td><div class="row-action" onclick="deleteRow(${rIdx})">×</div></td>`;
            tbody.appendChild(tr);
        });
    }

    function calculateTotals() {
        let totalPending = 0;
        let totalConfirmed = 0;
        let countPaid = 0;
        let countExchange = 0;

        const priceIdx = headers.findIndex(h => h.includes("价格") || h.includes("佣金"));
        const paidIdx = headers.findIndex(h => h.includes("结款"));
        const typeIdx = headers.findIndex(h => h.includes("方式"));

        data.forEach(row => {
            // 金额
            if (priceIdx > -1) {
                let val = parseFloat(String(row.cells[priceIdx]).replace(/[^\d.]/g, '')) || 0;
                totalPending += val;
                if (paidIdx > -1 && row.cells[paidIdx] === true) totalConfirmed += val;
            }
            // 计数
            if (typeIdx > -1) {
                if (String(row.cells[typeIdx]).includes("寄拍")) countPaid++;
                if (String(row.cells[typeIdx]).includes("置换")) countExchange++;
            }
        });

        document.getElementById('totalProjected').innerText = '¥' + totalPending;
        document.getElementById('totalConfirmed').innerText = '¥' + totalConfirmed;
        document.getElementById('totalWaiting').innerText = '¥' + (totalPending - totalConfirmed);
        document.getElementById('countPaid').innerText = countPaid;
        document.getElementById('countExchange').innerText = countExchange;
    }

    // --- 数据操作 ---

    // 防抖计时器，用于自动保存
    let autoSaveTimer = null;

    function triggerAutoSave() {
        if (!cloudConfig.apiKey || !cloudConfig.binId) return;
        
        const syncBtn = document.getElementById('syncBtnText');
        const originalText = syncBtn.innerText;
        syncBtn.innerText = '保存中...';
        
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(async () => {
            await pushToCloud(true); // true 表示是自动保存，不弹窗打扰
            syncBtn.innerText = originalText;
        }, 1000); // 1秒后执行
    }

    window.updateData = (r, c, val) => {
        // 当输入文字“是”或“否”时，自动转换为复选框(布尔值)
        if (typeof val === 'string') {
            const text = val.trim();
            if (text === '是') {
                val = true;
            } else if (text === '否') {
                val = false;
            }
        }
        
        data[r].cells[c] = val;
        saveLocal();
        if (typeof val === 'boolean' || (typeof val === 'string' && (val.includes("寄拍") || val.includes("置换")))) renderTable();
        calculateTotals();
        triggerAutoSave(); // 触发自动保存
    }

    window.revertToText = (r, c) => {
        if(confirm("确定要取消复选框，恢复为普通文字吗？")) {
            data[r].cells[c] = "";
            saveLocal();
            renderTable();
            calculateTotals();
            triggerAutoSave();
        }
    }

    // 行拖拽逻辑
    let draggedRowIdx = null;
    window.onDragStart = (e, idx) => {
        draggedRowIdx = idx;
        e.dataTransfer.effectAllowed = 'move';
    }
    window.onDragOver = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }
    window.onDrop = (e, idx) => {
        e.preventDefault();
        if (draggedRowIdx === null || draggedRowIdx === idx) return;
        const draggedRow = data.splice(draggedRowIdx, 1)[0];
        data.splice(idx, 0, draggedRow);
        saveLocal();
        renderTable();
        triggerAutoSave();
        draggedRowIdx = null;
    }

    window.updateHeader = (i, val) => {
        if (val.trim() === '') {
            val = '未命名列';
        }
        headers[i] = val;
        
        // 智能推断列类型转换
        const isCheckboxName = val.includes("已") || val.includes("完成");
        const hasTextData = data.some(r => typeof r.cells[i] === 'string' && r.cells[i] !== "" && r.cells[i] !== "N/A");
        const hasBooleanData = data.some(r => typeof r.cells[i] === 'boolean');
        
        if (isCheckboxName && !hasBooleanData) {
            if (confirm(`是否将【${val}】列转换为复选框（打勾）？（原有的文字内容会被清空）`)) {
                data.forEach(r => {
                    if (r.cells[i] !== "N/A") r.cells[i] = false;
                });
            }
        } else if (!isCheckboxName && hasBooleanData) {
            if (confirm(`是否将【${val}】列转换为普通文本？（复选框将被移除）`)) {
                data.forEach(r => {
                    if (typeof r.cells[i] === 'boolean') {
                        r.cells[i] = r.cells[i] ? "完成" : "";
                    }
                });
            }
        }
        
        saveLocal();
        renderTable();
        triggerAutoSave();
    }

    window.addRow = () => {
        const newRow = {
            id: Date.now(),
            cells: headers.map(h => (h.includes("已") || h.includes("完成")) ? false : "")
        };
        data.push(newRow);
        saveLocal();
        renderTable();
        triggerAutoSave();
    }

    window.addColumn = () => {
        const name = prompt("列名:", "新列");
        if(name) {
            headers.push(name);
            const isCheckbox = name.includes("已") || name.includes("完成");
            data.forEach(r => r.cells.push(isCheckbox ? false : ""));
            saveLocal();
            renderTable();
            triggerAutoSave();
        }
    }

    window.deleteColumn = (i) => {
        if(confirm(`确定删除列【${headers[i]}】吗?`)) {
            headers.splice(i, 1);
            data.forEach(r => r.cells.splice(i, 1));
            saveLocal();
            renderTable();
            calculateTotals();
            triggerAutoSave();
        }
    }

    window.moveColumn = (i, direction) => {
        if (i + direction < 0 || i + direction >= headers.length) return;
        
        // 交换 headers
        const tempHeader = headers[i];
        headers[i] = headers[i + direction];
        headers[i + direction] = tempHeader;
        
        // 交换 data
        data.forEach(r => {
            const tempCell = r.cells[i];
            r.cells[i] = r.cells[i + direction];
            r.cells[i + direction] = tempCell;
        });
        
        saveLocal();
        renderTable();
        triggerAutoSave();
    }

    window.deleteRow = (i) => {
        if(confirm("确定删除?")) {
            data.splice(i, 1);
            saveLocal();
            renderTable();
            calculateTotals();
            triggerAutoSave();
        }
    }

    window.resetData = () => {
        if(confirm("恢复默认数据?")) {
            localStorage.removeItem('headers');
            localStorage.removeItem('data');
            location.reload();
        }
    }

    function saveLocal() {
        localStorage.setItem('headers', JSON.stringify(headers));
        localStorage.setItem('data', JSON.stringify(data));
        showToast("已保存到本地");
    }

    function showToast(msg) {
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // --- 云同步逻辑 ---

    window.openSyncModal = () => document.getElementById('configModal').classList.add('active');
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    window.saveConfig = () => {
        cloudConfig.apiKey = document.getElementById('apiKey').value.trim();
        cloudConfig.binId = document.getElementById('binId').value.trim();
        localStorage.setItem('cloudConfig', JSON.stringify(cloudConfig));
    }

    window.manualSync = async () => {
        if (!cloudConfig.apiKey || !cloudConfig.binId) {
            alert("请先填入 Key 和 Bin ID");
            return;
        }
        
        const btn = document.querySelector('.btn-sync');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
        
        await pushToCloud(false);
        
        btn.innerHTML = '<i class="fas fa-cloud"></i> 云端同步';
        closeModal('configModal');
    }

    async function pushToCloud(isSilent = false) {
        try {
            const payload = { headers, data, updatedAt: new Date().toISOString() };
            const res = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': cloudConfig.apiKey
                },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                if(!isSilent) showToast("✅ 云端同步成功！");
                else {
                    const syncBtn = document.getElementById('syncBtnText');
                    if(syncBtn) syncBtn.innerText = '云端同步';
                }
            } else {
                if(!isSilent) alert("同步失败，请检查 Key 或 ID");
            }
        } catch (e) {
            console.error(e);
            if(!isSilent) alert("网络错误");
        }
    }

    async function pullFromCloud() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}/latest`, {
                headers: { 'X-Master-Key': cloudConfig.apiKey }
            });
            
            if (res.ok) {
                const json = await res.json();
                const remote = json.record;
                if (remote.data && remote.data.length > 0) {
                    headers = remote.headers;
                    data = remote.data;
                    saveLocal(); 
                    renderTable();
                    calculateTotals();
                    console.log("已从云端拉取最新数据");
                }
            }
        } catch (e) {
            console.error("拉取失败", e);
        }
    }

    // 启动
    init();

</script>

</body>
</html>
